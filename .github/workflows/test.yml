name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Check JavaScript syntax
        shell: bash
        run: find plugins -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run tests
        run: node --test
